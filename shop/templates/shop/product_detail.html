{% extends "shop/base.html" %}

{% block title %}{{ product.name }} — Okstal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        {% if product.image %}
        <img src="{{ product.image.url }}" class="img-fluid rounded" alt="{{ product.name }}">
        {% else %}
        <div class="bg-secondary d-flex align-items-center justify-content-center rounded" style="height: 400px;">
            <span class="text-white fs-4">No image</span>
        </div>
        {% endif %}
    </div>
    <div class="col-md-6">
        <h2>{{ product.name }}</h2>
        <p class="text-muted">{{ product.category.name }}</p>
        <h4 class="mb-3">${{ product.price }}</h4>
        <p>{{ product.description }}</p>
        <button class="btn btn-dark">Add to Cart</button>
        <a href="{% url 'shop:product_list' %}" class="btn btn-outline-secondary ms-2">Back</a>
    </div>
</div>
{% endblock %}
